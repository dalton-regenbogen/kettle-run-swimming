        <rect x="710" y="45" width="10" height="20" rx="4" />
      </g>
      <g fill="rgba(0, 81, 48, .15)">
        <rect x="724" y="45" width="10" height="20" rx="5" />
        <rect x="738" y="45" width="10" height="20" rx="4" />
        <rect x="752" y="45" width="10" height="20" rx="5" />
        <rect x="766" y="45" width="10" height="20" rx="4" />
        <rect x="780" y="45" width="10" height="20" rx="5" />
      </g>
      <g fill="rgba(243, 115, 34, .15)">
        <rect x="794" y="45" width="10" height="20" rx="4" />
        <rect x="808" y="45" width="10" height="20" rx="5" />
        <rect x="822" y="45" width="10" height="20" rx="4" />
        <rect x="836" y="45" width="10" height="20" rx="5" />
        <rect x="850" y="45" width="10" height="20" rx="4" />

      </g>
      <g fill="rgba(0, 81, 48, .15)">
        <rect x="864" y="45" width="10" height="20" rx="4" />
        <rect x="878" y="45" width="10" height="20" rx="5" />
      </g>

      <defs>
        <!-- Creates a repeating tile grid -->
        <pattern
          id="tileGrid"
          patternUnits="userSpaceOnUse"
          width="10"
          height="10"
        >
          <!-- vertical line -->
          <path d="M0 0V10" stroke="rgba(255,255,255,0.22)" stroke-width="1" />
          <!-- horizontal line -->
          <path d="M0 0H15" stroke="rgba(255,255,255,0.10)" stroke-width="1" />
        </pattern>
      </defs>

      <!-- Main black-ish strip -->
      <rect x="25" y="110" width="850" height="20" fill="rgba(0,0,0,0.10)" />

      <rect x="25" y="110" width="850" height="20" fill="url(#tileGrid)" />
    </svg>